spring.application.name=banco-digital

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/banco2026}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}

jwt.secreto=${JWT_SECRET}
jwt.expiracion-access-ms=600000
jwt.expiracion-refresh-dias=7

server.port=${PORT:8080}
app.https=${HTTPS_SEGURO:false}
app.cors.origenes=${CORS_ORIGENES:http://localhost:3000,http://localhost:5173}

# Observabilidad Sprint 3: Actuator + Prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

# GraphQL Lab Creditos
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.schema.locations=classpath:graphql/
spring.graphql.path=/graphql
# Observabilidad adicional
management.endpoint.metrics.enabled=true
management.tracing.sampling.probability=1.0
logging.level.fe.banco_digital=INFO
