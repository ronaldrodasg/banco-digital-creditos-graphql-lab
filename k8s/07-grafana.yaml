apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: banco-digital
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: banco-digital
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'Banco Digital'
        orgId: 1
        folder: 'Banco Digital'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-banco-digital
  namespace: banco-digital
data:
  banco-digital-dashboard.json: |
    {
      "editable": true,
      "panels": [
        {
          "type": "stat",
          "title": "Backend UP",
          "targets": [{"expr": "up{job=\"banco-digital-backend\"}", "refId": "A"}],
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 0}
        },
        {
          "type": "timeseries",
          "title": "Peticiones HTTP por segundo",
          "targets": [{"expr": "sum(rate(http_server_requests_seconds_count[1m]))", "refId": "A"}],
          "gridPos": {"h": 8, "w": 12, "x": 6, "y": 0}
        },
        {
          "type": "timeseries",
          "title": "Memoria JVM usada",
          "targets": [{"expr": "sum(jvm_memory_used_bytes)", "refId": "A"}],
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
        }
      ],
      "schemaVersion": 39,
      "tags": ["spring-boot", "banco-digital", "prometheus"],
      "time": {"from": "now-15m", "to": "now"},
      "title": "Banco Digital Backend - Observabilidad Sprint 3",
      "uid": "banco-digital-backend-sprint3",
      "version": 1
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: banco-digital
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: grafana-datasource
              mountPath: /etc/grafana/provisioning/datasources/prometheus.yml
              subPath: prometheus.yml
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: grafana-dashboard-banco-digital
              mountPath: /var/lib/grafana/dashboards/banco-digital-dashboard.json
              subPath: banco-digital-dashboard.json
      volumes:
        - name: grafana-datasource
          configMap:
            name: grafana-datasource
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboard-banco-digital
          configMap:
            name: grafana-dashboard-banco-digital
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: banco-digital
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
  type: NodePort
