<svg width="680" height="780" viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- CLIENTE -->
  <rect x="230" y="20" width="220" height="60" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <circle cx="263" cy="44" r="9" fill="none" stroke="#5F5E5A" stroke-width="1.5"/>
  <path d="M249 64c0-7.7 6.3-12 14-12s14 4.3 14 12" fill="none" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="298" y="44" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" dominant-baseline="central">Cliente</text>
  <text x="298" y="63" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#888780" dominant-baseline="central">Postman · Frontend · App</text>

  <!-- flecha cliente → controller -->
  <line x1="340" y1="80" x2="340" y2="116" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <text x="348" y="102" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#B4B2A9">JSON</text>

  <!-- CONTROLLER -->
  <rect x="190" y="118" width="300" height="78" rx="12" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <!-- icono controller -->
  <line x1="212" y1="142" x2="232" y2="142" stroke="#534AB7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="212" y1="150" x2="224" y2="150" stroke="#534AB7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="212" y1="158" x2="227" y2="158" stroke="#534AB7" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="236" cy="158" r="5" fill="#7F77DD" fill-opacity="0.3" stroke="#7F77DD" stroke-width="1.3"/>
  <path d="M233.5 158l1.5 1.5 3-3" fill="none" stroke="#534AB7" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="250" y="145" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#3C3489" dominant-baseline="central">Controller</text>
  <text x="250" y="163" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#534AB7" dominant-baseline="central">Recibe HTTP · Delega al Service</text>
  <text x="250" y="180" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#534AB7" dominant-baseline="central">Devuelve ResponseEntity</text>

  <!-- flecha controller → service -->
  <line x1="340" y1="196" x2="340" y2="232" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr-purple)"/>
  <text x="348" y="218" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#B4B2A9">DTO</text>

  <!-- SERVICE -->
  <rect x="170" y="234" width="340" height="78" rx="12" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <!-- icono service -->
  <rect x="192" y="248" width="22" height="22" rx="5" fill="none" stroke="#0F6E56" stroke-width="1.5"/>
  <path d="M197 259l3.5 3.5 8-8" fill="none" stroke="#0F6E56" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="226" y="261" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#085041" dominant-baseline="central">Service</text>
  <text x="226" y="279" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#0F6E56" dominant-baseline="central">Lógica de negocio · Validaciones</text>
  <text x="226" y="296" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#0F6E56" dominant-baseline="central">Coordina Repository y Mapper</text>

  <!-- service → repository -->
  <path d="M250 312 L250 370 L200 370 L200 428" fill="none" stroke="#0F6E56" stroke-width="1" marker-end="url(#arr-teal)"/>
  <text x="204" y="362" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#B4B2A9">consulta</text>

  <!-- service → mapper -->
  <path d="M430 312 L430 370 L490 370 L490 428" fill="none" stroke="#0F6E56" stroke-width="1" marker-end="url(#arr-teal)"/>
  <text x="436" y="362" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#B4B2A9">Entidad</text>

  <!-- REPOSITORY -->
  <rect x="80" y="430" width="240" height="78" rx="12" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <!-- icono repository (cilindro) -->
  <ellipse cx="113" cy="456" rx="11" ry="4.5" fill="none" stroke="#854F0B" stroke-width="1.5"/>
  <path d="M102 456v12c0 2.5 5 4.5 11 4.5s11-2 11-4.5v-12" fill="none" stroke="#854F0B" stroke-width="1.5"/>
  <path d="M102 462c0 2.5 5 4.5 11 4.5s11-2 11-4.5" fill="none" stroke="#854F0B" stroke-width="1.5"/>
  <text x="136" y="457" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#633806" dominant-baseline="central">Repository</text>
  <text x="136" y="474" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#854F0B" dominant-baseline="central">Consultas a la BD</text>
  <text x="136" y="491" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#854F0B" dominant-baseline="central">Extiende JpaRepository</text>

  <!-- MAPPER -->
  <rect x="360" y="430" width="240" height="78" rx="12" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <!-- icono mapper (flechas bidireccionales) -->
  <rect x="378" y="448" width="11" height="9" rx="2.5" fill="none" stroke="#185FA5" stroke-width="1.4"/>
  <rect x="396" y="459" width="11" height="9" rx="2.5" fill="none" stroke="#185FA5" stroke-width="1.4"/>
  <line x1="389" y1="452.5" x2="396" y2="452.5" stroke="#185FA5" stroke-width="1.2"/>
  <path d="M394 450.5l2 2-2 2" fill="none" stroke="#185FA5" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="396" y1="463.5" x2="389" y2="463.5" stroke="#185FA5" stroke-width="1.2"/>
  <path d="M391 461.5l-2 2 2 2" fill="none" stroke="#185FA5" stroke-width="1.1" stroke-linecap="round"/>
  <text x="416" y="457" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#0C447C" dominant-baseline="central">Mapper</text>
  <text x="416" y="474" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#185FA5" dominant-baseline="central">Entidad → DTO</text>
  <text x="416" y="491" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#185FA5" dominant-baseline="central">DTO → Entidad</text>

  <!-- repository → service (retorno, punteado) -->
  <path d="M200 508 L200 556 L250 556 L250 568" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr-amber)"/>
  <text x="206" y="548" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#B4B2A9">Entidad</text>

  <!-- mapper → service (retorno, punteado) -->
  <path d="M490 508 L490 556 L430 556 L430 568" fill="none" stroke="#185FA5" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr-blue)"/>
  <text x="436" y="548" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#B4B2A9">DTO</text>

  <!-- linea de retorno al service -->
  <rect x="170" y="568" width="340" height="3" rx="1.5" fill="#e2e8f0"/>

  <!-- repository → PostgreSQL -->
  <line x1="200" y1="508" x2="200" y2="622" fill="none" stroke="#BA7517" stroke-width="1"/>
  <line x1="200" y1="622" x2="268" y2="622" fill="none" stroke="#BA7517" stroke-width="1" marker-end="url(#arr-amber)"/>

  <!-- POSTGRESQL -->
  <rect x="270" y="598" width="200" height="62" rx="12" fill="#f8fafc" stroke="#d1d5db" stroke-width="0.5"/>
  <!-- icono postgres -->
  <ellipse cx="303" cy="619" rx="11" ry="4" fill="none" stroke="#336791" stroke-width="1.5"/>
  <path d="M292 619v13c0 2.2 5 4 11 4s11-1.8 11-4v-13" fill="none" stroke="#336791" stroke-width="1.5"/>
  <path d="M292 625c0 2.2 5 4 11 4s11-1.8 11-4" fill="none" stroke="#336791" stroke-width="1.5"/>
  <path d="M292 631c0 2.2 5 4 11 4s11-1.8 11-4" fill="none" stroke="#336791" stroke-width="1.5"/>
  <text x="328" y="623" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#1e293b" dominant-baseline="central">PostgreSQL</text>
  <text x="328" y="641" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#64748b" dominant-baseline="central">Base de datos</text>

  <!-- leyenda -->
  <line x1="90" y1="720" x2="118" y2="720" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <text x="124" y="724" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#64748b">Flujo de ida</text>
  <line x1="240" y1="720" x2="268" y2="720" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="274" y="724" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#64748b">Flujo de retorno</text>
  <text x="420" y="724" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#B4B2A9">Banco Digital · Arquitectura en capas</text>

</svg>
